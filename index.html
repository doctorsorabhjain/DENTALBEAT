<!DOCTYPE html>
<html>

<head>

<title>Dental Beat Magazine</title>

<style>

body{
margin:0;
font-family:Arial;
background:#222;
color:white;
}

.container{
display:flex;
height:90vh;
}

.pdfviewer{
width:65%;
}

.videoarea{
width:35%;
background:#111;
padding:10px;
}

iframe{
width:100%;
height:100%;
border:none;
}

#audioPlayer{
width:100%;
height:70px;
background:#333;
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>

<body>

<div class="container">

<div class="pdfviewer">

<iframe src="magazine.pdf#toolbar=0"></iframe>

</div>

<div class="videoarea">

<h3>Video Explanation</h3>

<iframe id="videoFrame" src="" allowfullscreen></iframe>

</div>

</div>

<div id="audioPlayer">

<audio id="audio" controls></audio>

</div>

<script>

function playVideo(videoID){

document.getElementById("videoFrame").src =
"https://www.youtube.com/embed/" + videoID;

}

function playAudio(audioFile){

document.getElementById("audio").src = audioFile;

}

</script>

</body>

</html>
