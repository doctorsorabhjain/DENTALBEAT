<!DOCTYPE html>
<html>

<head>

<link rel="icon" href="data:,">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<title>IDA _MWSB Dental Beat 2026</title>

<link rel="stylesheet" href="css/styles.css">

</head>


<body>

<!-- ================= VIEWER ================= -->


<div id="viewer">

<img id="slideImage">

<div id="hotspotLayer"></div>

</div>

<div id="pageNumber"></div>


<!-- ================= NAVIGATION ================= -->

<div id="navBar">

<button onclick="prevSlide()">Previous</button>
<button onclick="nextSlide()">Next</button>

</div>


<!-- ================= THUMBNAILS ================= -->

<div id="thumbBar"></div>


<!-- ================= VIDEO POPUP ================= -->

<div id="videoPopup" class="hidden">
<div id="videoContainer"></div>
</div>



<!-- ================= SERVICE WORKER ================= -->

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker
.register("sw.js")
.then(()=>console.log("Service worker registered"))

}

</script>



<!-- ================= ISSUE SELECTOR ================= -->

<script>

/* Read issue from URL */

const params = new URLSearchParams(window.location.search)

window.ISSUE_PATH = params.get("issue") || "2026/issue1"

</script>



<!-- ================= LOAD ISSUE CONFIG ================= -->

<script>

const script = document.createElement("script")
script.src = "issues/" + window.ISSUE_PATH + "/config.js"

script.onload = function(){

console.log("CONFIG LOADED:",window.FLIPBOOK_CONFIG)

/* start viewer AFTER config loads */

if(window.safeInit){
safeInit()
}

}

document.head.appendChild(script)

</script>



<!-- ================= LOAD PLAYER ================= -->

<script src="js/player.js"></script>

</body>
</html>
